name: Check Antares Simulator Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read current version
        id: current
        run: |
          VERSION=$(grep 'ANTARES_SIMULATOR_VERSION' versions/antares-simulator.txt | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Fetch latest stable Antares release
        id: latest
        run: |
          TAGS=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/AntaresSimulatorTeam/Antares_Simulator/tags?per_page=50")

          if [ -z "$TAGS" ]; then
            echo "ERROR: Could not fetch tags from GitHub API"
            exit 1
          fi

          LATEST=$(echo "$TAGS" \
            | jq -r '.[].name' \
            | grep -v -i -E 'rc|alpha|beta|continuous|nightly' \
            | sed 's/^v//' \
            | sort -V \
            | tail -1)

          if [ -z "$LATEST" ]; then
            echo "ERROR: Could not parse latest stable version"
            exit 1
          fi

          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest stable version: $LATEST"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          echo "Current: $CURRENT  |  Latest: $LATEST"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "update=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date."
          else
            echo "update=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: $LATEST"
          fi

      - name: Create GitHub Issue
        if: steps.compare.outputs.update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const latest = '${{ steps.latest.outputs.version }}';
            const current = '${{ steps.current.outputs.version }}';
            const title = `Antares Simulator v${latest} detected - validation required`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const duplicate = existing.data.find(i => i.title.includes(`Antares Simulator v${latest}`));
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number} - skipping.`);
              return;
            }

            const body = [
              '## New Version Detected',
              '',
              'A new version of Antares Simulator has been detected.',
              '',
              '| | |',
              '|---|---|',
              `| **Previous version** | \`${current}\` |`,
              `| **New version** | \`${latest}\` |`,
              `| **Release page** | https://github.com/AntaresSimulatorTeam/Antares_Simulator/releases/tag/v${latest} |`,
              '',
              'This issue tracks validation and integration into GEMS.',
              '',
              '---',
              '',
              '## Tasks',
              '',
              '### Validation',
              '- [ ] Run E2E tests on library models',
              '- [ ] Run E2E tests on taxonomy',
              '- [ ] Run edge case scenarios',
              '- [ ] Compare results with previous version',
              '',
              '### Compatibility',
              '- [ ] Check GEMS Language syntax impact',
              '- [ ] Verify Modeler compatibility',
              '- [ ] Identify breaking changes',
              '',
              '### Documentation',
              '- [ ] Update GEMS Language documentation if needed',
              '- [ ] Document behavioral changes',
              '- [ ] Add migration notes',
              '',
              '### Decision',
              `- [ ] Approve version - update \`versions/antares-simulator.txt\` to \`${latest}\``,
              '- [ ] Reject version - close this issue with explanation',
              '',
              '---',
              '',
              '## Notes',
              '',
              '_Add findings and observations here._',
            ].join('\n');

            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
            });

            console.log(`Issue created: #${result.data.number} - ${result.data.html_url}`);
